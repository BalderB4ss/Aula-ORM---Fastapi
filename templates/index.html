<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Escolar</title>

<style>
:root {
    --bg: #eef2ff;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --primary: #5048e5;
    --primary-soft: #e0e7ff;
    --success: #059669;
    --warning: #d97706;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh; /* garante altura total */
}

header {
    width: 100%;
    background: var(--primary);
    color: white;
    text-align: center;
    padding: 25px 10px;
}

header h1 {
    font-size: 1.6rem;
}

nav {
    width: 100%;
    background: white;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--border);
}

nav a {
    padding: 15px 20px;
    text-decoration: none;
    color: var(--muted);
    font-weight: bold;
}

nav a:hover {
    color: var(--primary);
}

main {
    max-width: 900px;
    width: 100%;
    padding: 30px 20px;
    flex: 1; /* empurra o footer */
}

.panel-header {
    text-align: center;
    margin-bottom: 25px;
}

.panel-header h2 {
    color: var(--primary);
}

.grid {
    display: grid;
    gap: 15px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.card {
    background: var(--surface);
    border-radius: 10px;
    padding: 20px;
    border: 1px solid var(--border);
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

.card h3 {
    color: var(--muted);
    margin-bottom: 10px;
    font-size: 0.85rem;
}

.card .value {
    font-size: 1.6rem;
    color: var(--primary);
    font-weight: bold;
}

.card .meta {
    font-size: 0.85rem;
    color: var(--muted);
}

.card.wide {
    grid-column: 1 / -1;
    text-align: left;
}

.list {
    list-style: none;
}

.list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
}

.badge {
    background: var(--primary-soft);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
}

.badge.success {
    background: #ecfdf5;
    color: var(--success);
}

.badge.warning {
    background: #fffbeb;
    color: var(--warning);
}

footer {
    width: 100%;
    text-align: center;
    padding: 15px;
    background: white;
    border-top: 1px solid var(--border);
}
</style>
</head>

<body>

<header>
    <h1>Gestão Escolar</h1>
    <p>Portal do aluno</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="/cursos/cadastro" class="btn-destaque">Cadastrar Cursos</a>
</nav>

<main>
    <div class="panel-header">
        <h2>Olá, Balder</h2>
        <p>3º ano B</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Média geral</h3>
            <div class="value">8,4</div>
            <div class="meta">Acima da média</div>
        </div>

        <div class="card">
            <h3>Frequência</h3>
            <div class="value">96%</div>
            <div class="meta">Excelente presença</div>
        </div>

        <div class="card">
            <h3>Próxima prova</h3>
            <div class="value">Matemática</div>
            <div class="meta">Quarta-feira</div>
        </div>

        <div class="card wide">
            <h3>Agenda</h3>
            <ul class="list">
                <li><span>Trabalho de História</span><span class="badge warning">Amanhã</span></li>
                <li><span>Prova de Matemática</span><span>Qua</span></li>
                <li><span>Apresentação</span><span>Sex</span></li>
            </ul>
        </div>
    </div>
</main>

<footer>
    © 2026 Gestão Escolar
</footer>

</body>
</html>
